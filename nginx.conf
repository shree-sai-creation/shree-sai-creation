##############################################
# Shree Sai Creation — Nginx Configuration
# Domain: shreesaicreation.com
# Generated for production deployment
##############################################

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name shreesaicreation.com www.shreesaicreation.com
                shreeaicreation.com.au shreeaicreation.org shreeaicreation.online;

    # Let's Encrypt challenge (Certbot uses this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://shreesaicreation.com$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shreesaicreation.com www.shreesaicreation.com;

    # SSL certificates (Certbot will fill these in)
    ssl_certificate /etc/letsencrypt/live/shreesaicreation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shreesaicreation.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Connection settings
    client_max_body_size 10M;
    keepalive_timeout 65;

    # Gzip compression (bandwidth save karo)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cache static Next.js files (images, JS, CSS)
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache public files (favicon, robots.txt, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf)$ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Main proxy to Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Hide server info
    server_tokens off;
}
